services:

  app:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile

    container_name: mini-ecommerce-app

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      - postgres

    restart: unless-stopped

  postgres:
    image: postgres:16

    container_name: mini-ecommerce-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  prometheus:
    image: prom/prometheus

    container_name: mini-ecommerce-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml

    restart: unless-stopped

  grafana:
    image: grafana/grafana

    container_name: mini-ecommerce-grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager

    container_name: mini-ecommerce-alertmanager

    ports:
      - "9093:9093"

    restart: unless-stopped
    elasticsearch:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1

      container_name: elasticsearch

      environment:
        - discovery.type=single-node
        - xpack.security.enabled=false

      ports:
        - "9200:9200"

      volumes:
        - elasticsearch_data:/usr/share/elasticsearch/data

      restart: unless-stopped
    kibana:
      image: docker.elastic.co/kibana/kibana:8.14.1

      container_name: kibana

      ports:
        - "5601:5601"

      environment:
        ELASTICSEARCH_HOSTS: http://elasticsearch:9200

      depends_on:
        - elasticsearch

      restart: unless-stopped
    filebeat:
      image: docker.elastic.co/beats/filebeat:8.14.1

      container_name: filebeat

      user: root

      volumes:
        - ./monitoring/filebeat.yml:/usr/share/filebeat/filebeat.yml
        - /var/lib/docker/containers:/var/lib/docker/containers:ro
        - /var/run/docker.sock:/var/run/docker.sock

      depends_on:
        - elasticsearch

  restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  elasticsearch_data:
