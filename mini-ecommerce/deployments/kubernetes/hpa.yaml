apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: mini-ecommerce-hpa

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mini-ecommerce

  minReplicas: 1
  maxReplicas: 5

  behavior:

    scaleUp:

      stabilizationWindowSeconds: 30

      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

    scaleDown:

      stabilizationWindowSeconds: 60

      policies:
        - type: Percent
          value: 50
          periodSeconds: 30

  metrics:

    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 50