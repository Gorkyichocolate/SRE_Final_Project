apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: mini-ecommerce-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mini-ecommerce

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 50